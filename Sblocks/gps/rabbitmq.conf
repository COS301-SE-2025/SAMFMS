# RabbitMQ Configuration for GPS Tracking Service

# Management plugin configuration
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0

# MQTT plugin configuration (for IoT devices)
mqtt.default_user = gps_service
mqtt.default_pass = gps_service_password
mqtt.allow_anonymous = false
mqtt.tcp_listen_options.port = 1883

# Default virtual host
default_vhost = /gps_tracking

# Default user configuration
default_user = gps_service
default_pass = gps_service_password

# Logging configuration
log.console = true
log.console.level = info
log.file = /var/log/rabbitmq/rabbitmq.log
log.file.level = info

# Disk free space monitoring
disk_free_limit.absolute = 1GB

# Memory configuration
vm_memory_high_watermark.relative = 0.6

# Heartbeat configuration
heartbeat = 60

# TCP configuration
tcp_listen_options.port = 5672
tcp_listen_options.backlog = 128
tcp_listen_options.nodelay = true

# Clustering configuration (for production)
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq1
cluster_formation.classic_config.nodes.2 = rabbit@rabbitmq2
