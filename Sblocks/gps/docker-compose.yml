version: '3.8'

services:
  # GPS Tracking Service
  gps-service:
    build: .
    container_name: samfms-gps-service
    ports:
      - '8003:8003'
    environment:
      # Database
      - MONGODB_URL=mongodb://mongodb:27017

      # RabbitMQ (for messaging)
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

      # Redis (for caching)
      - REDIS_URL=redis://redis:6379

      # Service configuration
      - GPS_SERVICE_PORT=8003
      - DEBUG=true
      - LOG_LEVEL=info

      # CORS origins
      - CORS_ORIGINS=["http://localhost:3000", "http://localhost:8080"]

      # Location tracking settings
      - LOCATION_UPDATE_INTERVAL=5
      - LOCATION_HISTORY_RETENTION_DAYS=365
      - MAX_SPEED_THRESHOLD=120

      # Geofencing settings
      - GEOFENCE_CHECK_INTERVAL=10
      - DEFAULT_GEOFENCE_BUFFER=0.1

      # Real-time settings
      - ENABLE_REALTIME_UPDATES=true
      - WEBSOCKET_HEARTBEAT_INTERVAL=30
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - gps-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8003/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: samfms-gps-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=gps_tracking_db
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    restart: unless-stopped
    networks:
      - gps-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.runCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: samfms-gps-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - gps-network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: samfms-gps-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - gps-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

networks:
  gps-network:
    driver: bridge
    name: samfms-gps-network
